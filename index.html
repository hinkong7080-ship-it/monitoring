    <style>
        /* --- [SECTION 1: GLOBAL UI THEME] --- */
        :root {
            --neon-yellow: #ffeb3b; --neon-red: #ff2d55; --neon-cyan: #00e5ff;
            --korea-blue: #2979ff; --china-grey: #aaaaaa; --vessel-green: #00ff88;
            --war-red: #ff0000; --custom-bg: #060c18; --panel-bg: rgba(6, 14, 28, 0.93);

            --ui-margin: clamp(16px, 2.5vw, 40px);

            --controls-width: clamp(180px, 17vw, 320px);

            --btn-padding: clamp(8px, 0.73vw, 14px);

            --list-item-font: clamp(10px, 0.78vw, 15px);

        #bottom-bar { position: absolute; bottom: var(--ui-margin); left: var(--ui-margin); right: var(--ui-margin); display: flex; flex-wrap: wrap; align-items: flex-end; z-index: 9999; pointer-events: none; }
        #bottom-bar.wrapped { justify-content: center; gap: var(--nav-gap); }
        #main-nav-container { display: flex; flex-direction: column; gap: var(--nav-gap); pointer-events: auto; }
        .tab-group { display: grid; grid-template-columns: 1fr 1fr; gap: var(--nav-gap); width: var(--nav-width); }
        .switch-btn {
            background: rgba(0, 0, 0, 0.85); border: 2.5px solid var(--neon-cyan); color: var(--neon-cyan);
            padding: var(--btn-padding) 0; border-radius: 4px; cursor: pointer; font-weight: 800; font-size: var(--btn-font);
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; backdrop-filter: blur(15px); text-align: center;
        }
        .switch-btn:hover { background: rgba(0, 229, 255, 0.2); transform: translateY(-2px); }
        .switch-btn.active { background: var(--neon-cyan); color: #000; box-shadow: 0 0 25px rgba(0, 229, 255, 0.6); }

        /* [좌측 상세 정보 패널] */
        #left-list-panel {
            position: absolute; left: var(--ui-margin); bottom: var(--nav-bottom-offset);
            height: auto; max-height: calc(100vh - 45vh); width: var(--nav-width); box-sizing: border-box;
            background: var(--panel-bg); border: 1.5px solid var(--neon-cyan);
            border-radius: 4px; padding: var(--panel-padding); opacity: 0; visibility: hidden;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 500; backdrop-filter: blur(35px);
            display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0, 229, 255, 0.2);
        }
        #left-list-panel.active { opacity: 1; visibility: visible; }
        .list-title { font-weight: 800; font-size: var(--list-title-font); color: var(--neon-cyan); margin-bottom: clamp(10px, 1vw, 20px); border-bottom: 1px solid rgba(0,229,255,0.3); padding-bottom: clamp(6px, 0.63vw, 12px); text-transform: uppercase; }
        .list-content { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(5px, 0.52vw, 10px); overflow-y: auto; flex-grow: 1; padding-right: clamp(6px, 0.78vw, 15px); }

        .list-content::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 2px; }
        .list-item { font-size: var(--list-item-font); color: rgba(255, 255, 255, 0.95); line-height: 1.6; display: flex; align-items: flex-start; }
        .list-item::before { content: '• '; color: var(--neon-cyan); margin-right: 8px; flex-shrink: 0; }

        /* [Header KPI Ribbon] */
        #header-main-title { position: absolute; top: var(--ui-margin); left: var(--ui-margin); right: var(--ui-margin); z-index: 1800; display: flex; align-items: center; pointer-events: none; }

        .accent-text { color: var(--neon-cyan); text-shadow: 0 0 20px rgba(0, 229, 255, 0.5); }
        .header-info-ribbon { display: flex; align-items: center; justify-content: space-around; flex-grow: 1; border-left: 4.5px solid rgba(255, 255, 255, 0.15); padding-left: 1.5vw; height: var(--ribbon-height); pointer-events: auto; }
        .info-tag { display: flex; flex-direction: column; gap: 4px; flex: 1; padding-left: 2vw; position: relative; cursor: help; transition: 0.3s; }
        .info-tag:hover { background: rgba(0, 229, 255, 0.05); }
        .info-tag:not(:last-child)::after { content: ''; position: absolute; right: 0; top: 10%; height: 80%; width: 1.5px; background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.25), transparent); }

        .rep-container { max-width: 1400px; margin: 0 auto; padding: clamp(50px, 7vh, 100px) clamp(20px, 4vw, 60px); }

        .summary-card { background: rgba(255,255,255,0.03); padding: clamp(14px, 1.56vw, 30px); border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(10px); }
        .summary-label { font-size: clamp(10px, 0.78vw, 15px); font-weight: 600; color: var(--neon-cyan); display: block; margin-bottom: 8px; text-transform: uppercase; }
        .summary-value { font-size: clamp(16px, 1.56vw, 30px); font-weight: 800; }
        .trend-up { color: var(--vessel-green); font-size: clamp(10px, 0.83vw, 16px); margin-left: 8px; font-weight: 700; }

        .analysis-card { background: rgba(0, 25, 45, 0.5); border-radius: 20px; padding: clamp(20px, 2.1vw, 40px); border: 1px solid rgba(0, 229, 255, 0.15); margin-bottom: clamp(20px, 2.1vw, 40px); }
        .p-track { width: 100%; height: clamp(20px, 1.88vw, 36px); background: rgba(255,255,255,0.05); border-radius: 8px; overflow: hidden; margin-top: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .p-fill-kogas { height: 100%; background: linear-gradient(90deg, #1e40af, var(--kogas-blue)); width: 74%; }
        .p-fill-private { height: 100%; background: linear-gradient(90deg, #c2410c, var(--private-orange)); width: 26%; }

        .rep-table { width: 100%; border-collapse: separate; border-spacing: 0; margin-bottom: clamp(20px, 2.1vw, 40px); font-size: clamp(10px, 0.78vw, 15px); border-radius: 12px; overflow: hidden; }
        .rep-table th { text-align: left; padding: clamp(10px, 1.04vw, 20px); background: rgba(255,255,255,0.05); color: var(--neon-cyan); border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: 800; }

        .min-card { background: rgba(255,255,255,0.03); border-radius: 16px; padding: clamp(14px, 1.56vw, 30px); border: 1px solid rgba(255,255,255,0.08); position: relative; transition: 0.3s; }

        .min-dep-badge { font-size: clamp(9px, 0.63vw, 12px); font-weight: 800; padding: 5px 12px; border-radius: 4px; position: absolute; top: clamp(12px, 1.3vw, 25px); right: clamp(12px, 1.3vw, 25px); background: var(--war-red); color: #fff; box-shadow: 0 0 15px rgba(255, 45, 85, 0.5); }

        window.latLonToVector3 = (lat, lon, r) => {
            const phi = (90 - lat) * (Math.PI / 180), theta = (lon + 180) * (Math.PI / 180);
            return new THREE.Vector3(-r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
        };
        window.GreatCircleInterpolation = (p1, p2, t) => {
            const angle = p1.angleTo(p2); if (angle < 0.0001) return p1.clone();
            const sinTotal = Math.sin(angle);
            return new THREE.Vector3().addScaledVector(p1, Math.sin((1-t)*angle)/sinTotal).addScaledVector(p2, Math.sin(t*angle)/sinTotal).setLength(p1.length());
        };
        window.calculateDist = (p1, p2) => {
            const dLat = (p2.lat - p1.lat) * Math.PI / 180, dLon = (p2.lon - p1.lon) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.sin(dLon/2)**2;
            return 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };

            const ctx = canvas.getContext('2d'); const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            grad.addColorStop(0, color); grad.addColorStop(0.3, color); grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, 128, 128); return new THREE.CanvasTexture(canvas);
        };

                            <h2 class="rep-main-header">대한민국 핵심광물 공급망 분석 리포트</h2>
                            <p class="rep-sub-header">반도체·이차전지 필수 33종 광물의 특정 국가 의존도 및 산업 안보 리스크 지표 보고서</p>
                            <div class="summary-grid">
                                <div class="summary-card"><span class="summary-label">중국 정제 의존 품목</span><span class="summary-value">18종</span></div>
                                <div class="summary-card"><span class="summary-label">90% 이상 고의존</span><span class="summary-value" style="color:var(--neon-red);">8종</span></div>
                                <div class="summary-card"><span class="summary-label">안보 우선순위</span><span class="summary-value" style="color:var(--neon-yellow);">URGENT</span></div>
                                <div class="summary-card"><span class="summary-label">국내 자립 거점</span><span class="summary-value">2개소 (상동, 온산)</span></div>
                            </div>
                            <div class="rep-section-h3">전략적 핵심광물 리스크 랭킹 (Selected 13)</div>
                            <div class="minerals-grid">
                                <div class="min-card"><span class="min-dep-badge">98%</span><h4>1. 갈륨 (Ga)</h4><p style="font-size:13px; opacity:0.6; margin-top:10px;">차세대 반도체 필수재. 2023년부터 중국 수출 통제 시행 중.</p></div>
                                <div class="min-card"><span class="min-dep-badge">97%</span><h4>2. 흑연 (Graphite)</h4><p style="font-size:13px; opacity:0.6; margin-top:10px;">이차전지 음극재 핵심 원료. 인조/천연 흑연 모두 대중 의존.</p></div>
                                <div class="min-card"><span class="min-dep-badge">92%</span><h4>3. 게르마늄 (Ge)</h4><p style="font-size:13px; opacity:0.6; margin-top:10px;">광섬유 및 야간 투시경 렌즈 필수 원료. 수출 통제 품목.</p></div>
                                <div class="min-card"><span class="min-dep-badge">93%</span><h4>4. 인듐 (In)</h4><p style="font-size:13px; opacity:0.6; margin-top:10px;">LCD/OLED 투명 전극(ITO) 핵심 소재. 대체 불가 공급망.</p></div>
                                <div class="min-card" style="border-color:var(--neon-cyan);"><span class="min-dep-badge" style="background:var(--kogas-blue); color:#fff;">65%</span><h4>5. 리튬 (Li)</h4><p style="font-size:13px; opacity:0.6; margin-top:10px;">EV 배터리 양극재 핵심 소재. 수입선 다변화 추진 최우선.</p></div>
                                <div class="min-card"><span class="min-dep-badge">100%</span><h4>6. 비스무트 (Bi)</h4><p style="font-size:13px; opacity:0.6; margin-top:10px;">전량 중국 수입 의존. 반도체 저융점 합금 필수재.</p></div>
                                <div class="min-card"><span class="min-dep-badge">90%</span><h4>7. 망간 (Mn)</h4><p style="font-size:13px; opacity:0.6; margin-top:10px;">NCM 배터리 필수 원료. 중국 내 제련 비중 압도적.</p></div>
                                <div class="min-card"><span class="min-dep-badge">60%↑</span><h4>8. 코발트 (Co)</h4><p style="font-size:13px; opacity:0.6; margin-top:10px;">배터리 수명 핵심 소재. 콩고 채굴 → 중국 정제 독점.</p></div>
                                <div class="min-card"><span class="min-dep-badge">80%↑</span><h4>9. 니켈 (Ni)</h4><p style="font-size:13px; opacity:0.6; margin-top:10px;">고에너지 밀도 배터리 필수. 인도네시아 중국 자본 장악.</p></div>
                                <div class="min-card"><span class="min-dep-badge">85%</span><h4>10. REE (Nd/Pr)</h4><p style="font-size:13px; opacity:0.6; margin-top:10px;">전기차 모터용 영구자석 원료. 중국 독점 공급망 형성.</p></div>
                                <div class="min-card"><span class="min-dep-badge">98%↑</span><h4>11. REE (Dy/Tb)</h4><p style="font-size:13px; opacity:0.6; margin-top:10px;">중희토류 고온 안정성 필수. 대체재 확보 매우 어려움.</p></div>
                                <div class="min-card"><span class="min-dep-badge">80%</span><h4>12. 텅스텐 (W)</h4><p style="font-size:13px; opacity:0.6; margin-top:10px;">절삭공구 및 탄약용 초경합금 핵심. 대중 의존도 높음.</p></div>
                                <div class="min-card"><span class="min-dep-badge">100%</span><h4>13. 마그네슘 (Mg)</h4><p style="font-size:13px; opacity:0.6; margin-top:10px;">자동차 경량화 알루미늄 합금 필수. 중국 독점 생산.</p></div>
                            </div>
                        </div>`;
                }
            }
        };

        window.onClick = (e) => {
            if (!window.camera || !window.scene) return;
            const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            const rc = new THREE.Raycaster(); rc.setFromCamera(mouse, window.camera);
            const hits = rc.intersectObjects([...window.pins, ...window.vesselGroups.map(v => v.group)], true);
            if (hits.length > 0) {
                window.clickedTarget = hits[0].object.parent; const data = window.clickedTarget.userData;
                window.clearArcs(); window.updateLeftPanel(data);
                if (data.modeType === 'lng' || data.type === 'vessel') { window.createArc(window.clickedTarget.position, window.KOREA_POS, 0xffeb3b, 0.8); }
                else if (data.modeType === 'mineral') {
                    if (data.refinedInChina) { window.createArc(window.clickedTarget.position, window.CHINA_POS, 0xaaaaaa, 0.7); window.createArc(window.CHINA_POS, window.KOREA_POS, 0xaaaaaa, 0.7); window.chinaHubMarker.visible = true; }
                    else { window.createArc(window.clickedTarget.position, window.KOREA_POS, 0xffeb3b, 0.8); }
                }
                window.autoRotate = false;
            } else { 
                const globeHits = rc.intersectObject(window.globeBody);
                if (!globeHits.length) { window.clickedTarget = null; window.clearArcs(); window.autoRotate = true; document.getElementById('left-list-panel').classList.remove('active'); }
            }
        };

        /**
         * --- [SECTION 5: 3D ENGINE CORE - 박제 엔진] ---
         */
        async function startEngine() {
            window.scene = new THREE.Scene(); window.camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 1, 4000); window.camera.position.set(0,0,850);
            window.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); window.renderer.setSize(window.innerWidth, window.innerHeight); window.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); document.body.appendChild(window.renderer.domElement);
            const tiltAnchor = new THREE.Group(); tiltAnchor.rotation.z = (23.4 * Math.PI) / 180; window.scene.add(tiltAnchor); window.globe = new THREE.Group(); tiltAnchor.add(window.globe);
            window.globeBody = new THREE.Mesh(new THREE.SphereGeometry(CORE_RADIUS, 128, 128), new THREE.MeshLambertMaterial({ color: 0x091626 }));
            window.globe.add(window.globeBody);

            // 대기 글로우 (림 글로우 효과)
            const atmoMat = new THREE.MeshBasicMaterial({ color: 0x0d7a9a, transparent: true, opacity: 0.12, side: THREE.BackSide });
            window.globe.add(new THREE.Mesh(new THREE.SphereGeometry(CORE_RADIUS * 1.035, 64, 64), atmoMat));
            
            const gridMat = new THREE.LineBasicMaterial({ color: 0x1a7a92, transparent: true, opacity: 0.22 });
            for (let lat = -80; lat <= 80; lat += 10) {
                const pts = []; for (let lon = -180; lon <= 180; lon += 2) { pts.push(window.latLonToVector3(lat, lon, GRID_RADIUS)); }
                window.globe.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
            }
            for (let lon = -180; lon < 180; lon += 15) {
                const pts = []; for (let lat = -90; lat <= 90; lat += 2) { pts.push(window.latLonToVector3(lat, lon, GRID_RADIUS)); }
                window.globe.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
            }
            
            const slider = document.getElementById('rotationSpeedSlider');
            if (slider) {
                slider.addEventListener('input', (e) => {
                    window.rotationSpeed = parseFloat(e.target.value);
                });
            }

            window.scene.add(new THREE.AmbientLight(0x6ab4cc, 0.55)); const dLight = new THREE.DirectionalLight(0x88ccdd, 0.5); dLight.position.set(5, 3, 5); window.scene.add(dLight);
            try {
                const res = await fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json"), data = await res.json();
                const worldMesh = topojson.mesh(data, data.objects.countries), lineMat = new THREE.LineBasicMaterial({ color: 0x00c8d4, transparent: true, opacity: 0.7 });
                worldMesh.coordinates.forEach(lineGroup => { const pts = lineGroup.map(p => window.latLonToVector3(p[1], p[0], MAP_RADIUS)); window.globe.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lineMat)); });
                const loaderEl = document.getElementById('loader'); if(loaderEl) loaderEl.style.display = 'none';
            } catch(e) { console.error(e); }

            window.chinaHubMarker = new THREE.Group(); window.chinaHubMarker.position.copy(window.CHINA_POS);
            window.chinaHubMarker.add(new THREE.Mesh(new THREE.SphereGeometry(1.8, 16, 16), new THREE.MeshBasicMaterial({ color: 0x888888 })));
            window.chinaHubMarker.visible = false; window.globe.add(window.chinaHubMarker);

            window.renderCurrentMode(); animate();
        }

        window.renderCurrentMode = function() {
            if(!window.globe) return;
            window.pins.forEach(p => window.globe.remove(p)); window.pins = [];
            window.vesselGroups.forEach(v => window.globe.remove(v.group)); window.vesselGroups = [];
            const titleBox = document.getElementById('main-title-text'), ribbon = document.getElementById('dynamic-ribbon');

            if (window.currentMode === 'LNG') {
                if (titleBox) titleBox.innerHTML = `<div>GLOBAL <span class="accent-text">LNG</span></div><div>MONITORING</div>`;
                if (ribbon) ribbon.innerHTML = `<div class="info-tag" onmouseenter="window.showLeftList('lng-stats')" onmouseleave="window.hideLeftList()"><div class="info-label">Import Rank</div><div class="info-value">TOP 3 : KOREA</div></div><div class="info-tag" onmouseenter="window.showLeftList('lng-stats')" onmouseleave="window.hideLeftList()"><div class="info-label">Annual Target</div><div class="info-value">46.4M TONNES</div></div><div class="info-tag" onmouseenter="window.showLeftList('lng-stats')" onmouseleave="window.hideLeftList()"><div class="info-label">Main Providers</div><div class="info-value">QATAR/AUS/USA</div></div>`;
                window.LNG_DATA_MASTER.forEach(s => { const pin = createPin(s, 0xff2d55, 'lng'); window.globe.add(pin); window.pins.push(pin); });
                const vTex = window.createGlowTexture('#00ff88');
                window.VESSEL_DATA.forEach(r => {
                    const vGroup = new THREE.Group(); vGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), new THREE.MeshBasicMaterial({ color: 0x00ff88 })));
                    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: vTex, color: 0x00ff88, transparent: true, blending: THREE.AdditiveBlending }));
                    sprite.scale.set(12, 12, 1); vGroup.add(sprite);
                    const vWaypoints = r.route.map(p => window.latLonToVector3(p[0], p[1], VESSEL_RADIUS));
                    const vObj = { group: vGroup, vWaypoints, progress: Math.random(), speed: 0.00015, name: r.name, glow: sprite, modeType: 'lng', type: 'vessel' };
                    vGroup.userData = vObj; window.globe.add(vGroup); window.vesselGroups.push(vObj);
                });
            } else {
                if (titleBox) titleBox.innerHTML = `<div>CRITICAL <span class="accent-text">MINERALS</span></div><div>MONITORING</div>`;
                if (ribbon) ribbon.innerHTML = `<div class="info-tag" onmouseenter="window.showLeftList('strategic')" onmouseleave="window.hideLeftList()"><div class="info-label">Key Strategic</div><div class="info-value">10 Major Minerals</div></div><div class="info-tag" onmouseenter="window.showLeftList('security')" onmouseleave="window.hideLeftList()"><div class="info-label">Security Focus</div><div class="info-value">23 Major Items</div></div>`;
                window.MINERALS_MASTER_DATA.forEach(s => { const group = createPin(s, s.type === 'strategic' ? 0xffeb3b : 0xff2d55, 'mineral'); window.globe.add(group); window.pins.push(group); });
            }
        };

        function createPin(data, color, modeType) {
            const group = new THREE.Group(); group.position.copy(window.latLonToVector3(data.lat, data.lon, MARKER_RADIUS));
            group.userData = { ...data, modeType, pulse: Math.random()*Math.PI };
            group.add(new THREE.Mesh(new THREE.SphereGeometry(1.6, 16, 16), new THREE.MeshBasicMaterial({ color: color })));
            const ring = new THREE.Mesh(new THREE.RingGeometry(2.5, 4.5, 32), new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.4, side: THREE.DoubleSide }));
            ring.lookAt(0,0,0); group.add(ring); return group;
        }

        function animate() {
            requestAnimationFrame(animate); const now = Date.now();
            if (window.autoRotate && !window.isDragging) { window.globe.rotation.y += window.rotationSpeed; window.globe.rotation.x = THREE.MathUtils.lerp(window.globe.rotation.x, 0, 0.05); }
            window.pins.forEach(p => { if(p.userData) { p.userData.pulse += 0.04; const s = 1 + Math.sin(p.userData.pulse) * 0.3; p.children[1].scale.set(s, s, 1); } });
            if (window.vesselGroups && window.vesselGroups.length > 0) {
                window.vesselGroups.forEach(v => {
                    v.progress += v.speed; if (v.progress > 1) v.progress = 0;
                    const segs = v.vWaypoints.length - 1; const scaled = v.progress * segs; const idx = Math.min(Math.floor(scaled), segs - 1);
                    v.group.position.copy(window.GreatCircleInterpolation(v.vWaypoints[idx], v.vWaypoints[idx+1], scaled - idx));
                    const pulse = 1.0 + Math.sin(now * 0.005) * 0.2; v.glow.scale.set(12 * pulse, 12 * pulse, 1);
                });
            }
            if (window.clickedTarget && window.clickedTarget.userData && window.clickedTarget.userData.lat) {
                const dist = window.calculateDist(window.clickedTarget.userData, { lat: KOREA_LAT, lon: KOREA_LON });
                const mid = window.GreatCircleInterpolation(window.clickedTarget.position, window.KOREA_POS, 0.5).setLength(MARKER_RADIUS + 25);
                const midW = mid.applyMatrix4(window.globe.matrixWorld); const midSp = midW.project(window.camera);
                const dB = document.getElementById('distanceBadge');
                if (midW.normalize().dot(window.camera.position.clone().normalize()) > 0.05) { if(dB) { dB.innerText = `${Math.round(dist).toLocaleString()} KM`; dB.className = 'distance-badge active'; dB.style.left = (midSp.x + 1) * window.innerWidth/2 + 'px'; dB.style.top = -(midSp.y - 1) * window.innerHeight/2 + 'px'; } }
                else { if(dB) dB.classList.remove('active'); }
            } else { const dB = document.getElementById('distanceBadge'); if(dB) dB.classList.remove('active'); }
            if(window.renderer && window.scene && window.camera) window.renderer.render(window.scene, window.camera);
        }

        window.onload = function() { startEngine().catch(function(e) { console.error('startEngine error:', e); }); };
        document.addEventListener('click', (e) => window.onClick(e));
        document.addEventListener('mousedown', (e) => { window.isDragging = true; window.previousPos = { x: e.clientX, y: e.clientY }; });
        document.addEventListener('mouseup', () => window.isDragging = false);
        document.addEventListener('mousemove', (e) => {
            if (window.isDragging) { window.globe.rotation.y += (e.clientX - window.previousPos.x) * 0.005; window.globe.rotation.x += (e.clientY - window.previousPos.y) * 0.005; window.previousPos = { x: e.clientX, y: e.clientY }; window.autoRotate = false; }
            if(window.camera) {
                const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
                const rc = new THREE.Raycaster(); rc.setFromCamera(mouse, window.camera);
                const hits = rc.intersectObjects([...window.pins, ...window.vesselGroups.map(v => v.group)], true);
                document.body.style.cursor = hits.length > 0 ? 'pointer' : 'default';
            }
        });
        window.addEventListener('wheel', (e) => { if(window.camera) window.camera.position.z = Math.min(Math.max(camera.position.z + e.deltaY * 0.5, 300), 1600); }, { passive: false });
        window.addEventListener('resize', () => { if(window.camera && window.renderer) { window.camera.aspect = window.innerWidth / window.innerHeight; window.camera.updateProjectionMatrix(); window.renderer.setSize(window.innerWidth, window.innerHeight); } });

        // --- [하단 바 wrap 감지 + 팝업 활성 시 컨트롤 숨김 & 버튼 위치 조정] ---
        (function() {
            function getNavBottomOffset() {
                // CSS: clamp(110px, 17vh, 185px)
                return Math.max(110, Math.min(185, window.innerHeight * 0.17));
            }

            function updateBottomLayout() {
                var bar = document.getElementById('bottom-bar');
                var nav = document.getElementById('main-nav-container');
                var overlay = document.getElementById('ui-overlay');
                var panel = document.getElementById('left-list-panel');
                if (!bar || !nav) return;

                var panelActive = panel && panel.classList.contains('active');

                if (panelActive) {
                    // 컨트롤 박스 화면 밖으로
                    if (overlay) overlay.style.display = 'none';
                    // wrap 중앙 정렬 해제
                    bar.classList.remove('wrapped');
                    // 버튼 그룹 상단이 팝업 하단 바로 아래에 오도록 위치 계산
                    var navBottomOffset = getNavBottomOffset();
                    var navH = nav.offsetHeight;
                    var newBottom = Math.max(4, navBottomOffset - navH - 6);
                    bar.style.bottom = newBottom + 'px';
                } else {
                    // 컨트롤 박스 복원 (리포트가 열려있으면 유지)
                    if (overlay && !window.activeReport) overlay.style.display = '';
                    bar.style.bottom = '';
                    // wrap 감지 재적용
                    var isWrapped = bar.offsetHeight > nav.offsetHeight * 1.25;
                    if (isWrapped) { bar.classList.add('wrapped'); } else { bar.classList.remove('wrapped'); }
                }

                // 지구본 중심 항상 화면 정중앙 유지
                if (window.camera) window.camera.position.y = 0;
            }

            // 팝업 active 클래스 변화 감지
            var panel = document.getElementById('left-list-panel');
            if (panel && typeof MutationObserver !== 'undefined') {
                new MutationObserver(updateBottomLayout).observe(panel, { attributes: true, attributeFilter: ['class'] });
            }
            // bottom-bar 크기 변화 감지
            if (typeof ResizeObserver !== 'undefined') {
                var bar = document.getElementById('bottom-bar');
                if (bar) new ResizeObserver(updateBottomLayout).observe(bar);
            }
            window.addEventListener('resize', updateBottomLayout);
            setTimeout(updateBottomLayout, 1500);
        })();
    </script>
